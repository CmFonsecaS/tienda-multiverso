<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión – TIENDA MULTIVERSO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="css/styles.css" rel="stylesheet"/>
</head>
<body style="background: linear-gradient(135deg, #1a1a2e 0%, #8b0000 100%); min-height: 100vh; display:flex; flex-direction:column; justify-content:center;">

  <!-- LOGO / HEADER -->
  <div class="text-center mb-4">
    <div style="font-family:'Bangers',cursive; font-size:3rem; color:#e23636; letter-spacing:4px;">
      TIENDA <span style="color:#f5c518;">MULTIVERSO</span>
    </div>
    <p style="color:#ccc; font-family:'Nunito',sans-serif;">Tu tienda de figuras de colección</p>
  </div>

  <!-- FORMULARIO LOGIN -->
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-5 col-lg-4">
        <div class="form-card">
          <h2 class="text-center mb-1">Iniciar Sesión</h2>
          <p class="text-center text-muted mb-4" style="font-size:0.9rem;">Ingresa a tu cuenta</p>

          <div id="alerta-login" class="alert alert-danger d-none" role="alert"></div>

          <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required/>
            <div class="invalid-feedback">Ingresa un correo válido.</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password" placeholder="Tu contraseña" required/>
              <button class="btn btn-outline-secondary" type="button" id="togglePass" title="Mostrar/Ocultar">👁</button>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="recordarme"/>
              <label class="form-check-label" for="recordarme" style="font-size:0.85rem;">Recordarme</label>
            </div>
            <a href="pages/recuperar.html" style="font-size:0.85rem; color:var(--rojo-marvel);">¿Olvidaste tu contraseña?</a>
          </div>

          <button class="btn btn-marvel w-100 mb-3" onclick="iniciarSesion()">Ingresar</button>

          <p class="text-center" style="font-size:0.9rem;">
            ¿No tienes cuenta? <a href="pages/registro.html" style="color:var(--rojo-marvel); font-weight:700;">Regístrate aquí</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER SIMPLE -->
  <p class="text-center mt-4" style="color:rgba(255,255,255,0.4); font-size:0.8rem;">
    © 2026 Tienda Multiverso – Desarrollo Full Stack II
  </p>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
  // Si ya hay sesión, redirigir
  const u = getUsuarioActual();
  if (u) {
    window.location.href = u.rol === 'admin' ? 'pages/admin-dashboard.html' : 'pages/catalogo.html';
  }

  // Cargar email recordado
  const emailGuardado = localStorage.getItem('marvel_recordar_email');
  if (emailGuardado) {
    document.getElementById('email').value = emailGuardado;
    document.getElementById('recordarme').checked = true;
  }

  // Toggle password
  document.getElementById('togglePass').addEventListener('click', () => {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  function iniciarSesion() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const alertaDiv = document.getElementById('alerta-login');

    // Validaciones básicas
    if (!email || !pass) {
      alertaDiv.textContent = 'Por favor completa todos los campos.';
      alertaDiv.classList.remove('d-none');
      return;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      alertaDiv.textContent = 'El correo ingresado no tiene un formato válido.';
      alertaDiv.classList.remove('d-none');
      return;
    }

    const usuarios = getUsuarios();
    const usuario = usuarios.find(u => u.email === email && u.password === pass);

    if (!usuario) {
      alertaDiv.textContent = 'Correo o contraseña incorrectos. Verifica tus datos.';
      alertaDiv.classList.remove('d-none');
      return;
    }

    alertaDiv.classList.add('d-none');
    setUsuarioActual(usuario);

    if (document.getElementById('recordarme').checked) {
      localStorage.setItem('marvel_recordar_email', email);
    } else {
      localStorage.removeItem('marvel_recordar_email');
    }

    // Redirigir según rol
    if (usuario.rol === 'admin') {
      window.location.href = 'pages/admin-dashboard.html';
    } else {
      window.location.href = 'pages/catalogo.html';
    }
  }

  // Enter para login
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') iniciarSesion();
  });
</script>
</body>
</html>

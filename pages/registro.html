<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro – TIENDA MULTIVERSO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="../css/styles.css" rel="stylesheet"/>
</head>
<body style="background: linear-gradient(135deg, #1a1a2e 0%, #8b0000 100%); min-height:100vh; padding: 30px 0;">

  <div class="text-center mb-4">
    <a href="../index.html" style="text-decoration:none;">
      <div style="font-family:'Bangers',cursive; font-size:2.2rem; color:#e23636; letter-spacing:4px;">
        TIENDA <span style="color:#f5c518;">MULTIVERSO</span>
      </div>
    </a>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="form-card">
          <h2 class="text-center mb-1">Crear Cuenta</h2>
          <p class="text-center text-muted mb-4" style="font-size:0.9rem;">Únete a la colección</p>

          <div id="alerta-reg" class="alert d-none" role="alert"></div>

          <!-- NOMBRE -->
          <div class="mb-3">
            <label class="form-label">Nombre completo *</label>
            <input type="text" class="form-control" id="reg-nombre" placeholder="Ej: Tony Stark" maxlength="60"/>
            <div class="form-text text-danger d-none" id="err-nombre">El nombre debe tener entre 3 y 60 caracteres.</div>
          </div>

          <!-- EMAIL -->
          <div class="mb-3">
            <label class="form-label">Correo electrónico *</label>
            <input type="email" class="form-control" id="reg-email" placeholder="correo@ejemplo.com"/>
            <div class="form-text text-danger d-none" id="err-email">Ingresa un correo válido.</div>
          </div>

          <!-- TELÉFONO -->
          <div class="mb-3">
            <label class="form-label">Teléfono (opcional)</label>
            <input type="text" class="form-control" id="reg-telefono" placeholder="+569XXXXXXXX" maxlength="15"/>
            <div class="form-text text-danger d-none" id="err-telefono">Formato inválido (ej: +56912345678).</div>
          </div>

          <!-- DIRECCIÓN -->
          <div class="mb-3">
            <label class="form-label">Dirección de envío (opcional)</label>
            <input type="text" class="form-control" id="reg-direccion" placeholder="Calle, número, ciudad" maxlength="120"/>
          </div>

          <!-- PASSWORD -->
          <div class="mb-2">
            <label class="form-label">Contraseña *</label>
            <div class="input-group">
              <input type="password" class="form-control" id="reg-pass" placeholder="Crea tu contraseña"
                     oninput="mostrarValidacionesPassword(this.value, 'req-pass')"/>
              <button class="btn btn-outline-secondary" type="button" onclick="toggleVer('reg-pass')">👁</button>
            </div>
          </div>

          <!-- VALIDACIONES PASSWORD -->
          <div class="border rounded p-2 mb-3" id="req-pass" style="background:#fafafa; font-family:'Nunito',sans-serif;">
            <small class="text-muted">Requisitos de contraseña:</small>
          </div>

          <!-- CONFIRMAR PASSWORD -->
          <div class="mb-3">
            <label class="form-label">Confirmar contraseña *</label>
            <div class="input-group">
              <input type="password" class="form-control" id="reg-pass-conf" placeholder="Repite tu contraseña"/>
              <button class="btn btn-outline-secondary" type="button" onclick="toggleVer('reg-pass-conf')">👁</button>
            </div>
            <div class="form-text text-danger d-none" id="err-conf">Las contraseñas no coinciden.</div>
          </div>



          <button class="btn btn-marvel w-100 mb-3" onclick="registrarUsuario()">Crear cuenta</button>

          <p class="text-center" style="font-size:0.9rem;">
            ¿Ya tienes cuenta? <a href="../index.html" style="color:var(--rojo-marvel); font-weight:700;">Inicia sesión</a>
          </p>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
  // Inicializar validaciones vacías
  mostrarValidacionesPassword('', 'req-pass');

  function toggleVer(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function registrarUsuario() {
    // Limpiar errores
    ['err-nombre','err-email','err-telefono','err-conf'].forEach(id => {
      document.getElementById(id).classList.add('d-none');
    });
    const alerta = document.getElementById('alerta-reg');
    alerta.classList.add('d-none');

    const nombre = document.getElementById('reg-nombre').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const telefono = document.getElementById('reg-telefono').value.trim();
    const direccion = document.getElementById('reg-direccion').value.trim();
    const pass = document.getElementById('reg-pass').value;
    const passConf = document.getElementById('reg-pass-conf').value;


    let valido = true;

    // Nombre
    if (nombre.length < 3 || nombre.length > 60) {
      document.getElementById('err-nombre').classList.remove('d-none');
      valido = false;
    }

    // Email
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      document.getElementById('err-email').classList.remove('d-none');
      valido = false;
    }

    // Teléfono (si se ingresó)
    if (telefono && !/^\+?[0-9]{9,13}$/.test(telefono)) {
      document.getElementById('err-telefono').classList.remove('d-none');
      valido = false;
    }

    // Password
    if (!passwordValida(pass)) {
      valido = false;
    }

    // Confirmar
    if (pass !== passConf) {
      document.getElementById('err-conf').classList.remove('d-none');
      valido = false;
    }



    if (!valido) return;

    // Verificar email único
    const usuarios = getUsuarios();
    if (usuarios.find(u => u.email === email)) {
      alerta.textContent = 'Este correo ya está registrado. Prueba iniciando sesión.';
      alerta.classList.remove('d-none');
      alerta.classList.add('alert-danger');
      return;
    }

    // Crear usuario
    const nuevoId = usuarios.length > 0 ? Math.max(...usuarios.map(u => u.id)) + 1 : 1;
    const nuevoUsuario = {
      id: nuevoId,
      nombre,
      email,
      password: pass,
      rol: 'cliente',
      telefono,
      direccion
    };

    usuarios.push(nuevoUsuario);
    guardarUsuarios(usuarios);

    alerta.textContent = '¡Cuenta creada exitosamente! Redirigiendo...';
    alerta.classList.remove('d-none', 'alert-danger');
    alerta.classList.add('alert-success');

    setTimeout(() => {
      setUsuarioActual(nuevoUsuario);
      window.location.href = 'catalogo.html';
    }, 1500);
  }
</script>
</body>
</html>

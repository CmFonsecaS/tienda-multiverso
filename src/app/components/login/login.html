<div class="d-flex flex-column justify-content-center" style="background: linear-gradient(135deg, #1a1a2e 0%, #8b0000 100%); min-height: 100vh; padding: 40px 0;">
  <!-- LOGO / HEADER -->
  <div class="text-center mb-4">
    <div style="font-family:'Bangers',cursive; font-size:3rem; color:#e23636; letter-spacing:4px;">
      TIENDA <span style="color:#f5c518;">MULTIVERSO</span>
    </div>
    <p style="color:#ccc; font-family:'Nunito',sans-serif;">Tu tienda de figuras de colección</p>
  </div>

  <!-- FORMULARIO LOGIN -->
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        <div class="form-card">
          <h2 class="text-center mb-1">Iniciar Sesión</h2>
          <p class="text-center text-muted mb-4" style="font-size:0.9rem;">Ingresa a tu cuenta</p>

          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()">
            <div class="mb-3">
              <label class="form-label">Correo electrónico</label>
              <input type="email" class="form-control" formControlName="email" placeholder="ejemplo@correo.com"
                     [ngClass]="{'is-invalid': loginForm.get('email')?.touched && loginForm.get('email')?.invalid}"/>
              <div class="invalid-feedback">
                Ingresa un correo electrónico válido.
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <div class="input-group">
                <input [type]="showPassword ? 'text' : 'password'" class="form-control" formControlName="password" placeholder="Tu contraseña"
                       [ngClass]="{'is-invalid': loginForm.get('password')?.touched && loginForm.get('password')?.invalid}"/>
                <button class="btn btn-outline-secondary" type="button" (click)="togglePasswordVisibility()" title="Mostrar/Ocultar">
                  {{ showPassword ? '🙈' : '👁' }}
                </button>
              </div>
              <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="text-danger" style="font-size: 0.8rem; mt-1;">
                La contraseña es requerida.
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="recordarme" formControlName="recordarme"/>
                <label class="form-check-label" for="recordarme" style="font-size:0.85rem;">Recordarme</label>
              </div>
              <a routerLink="/recuperar" style="font-size:0.85rem; color:var(--rojo-marvel); text-decoration: none;">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn btn-marvel w-100 mb-3" [disabled]="loginForm.invalid">Ingresar</button>
          </form>

          <p class="text-center mb-0" style="font-size:0.9rem;">
            ¿No tienes cuenta? <a routerLink="/registro" style="color:var(--rojo-marvel); font-weight:700; text-decoration: none;">Regístrate aquí</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER SIMPLE -->
  <p class="text-center mt-4 mb-0" style="color:rgba(255,255,255,0.4); font-size:0.8rem;">
    © 2026 Tienda Multiverso – Desarrollo Full Stack II
  </p>
</div>

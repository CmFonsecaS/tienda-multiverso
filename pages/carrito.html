<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrito – TIENDA MULTIVERSO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="../css/styles.css" rel="stylesheet"/>
</head>
<body>
<div id="navbar-container"></div>

<div class="container mt-4 mb-5">
  <h2 style="font-family:'Bangers',cursive; font-size:2.2rem; color:var(--azul-oscuro); letter-spacing:2px;">
    🛒 Mi Carrito
  </h2>
  <hr/>

  <!-- CARRITO VACÍO -->
  <div id="carrito-vacio" class="text-center py-5 d-none">
    <div style="font-size:4rem;">🛒</div>
    <h4 class="text-muted">Tu carrito está vacío</h4>
    <a href="catalogo.html" class="btn btn-marvel mt-3">Ver catálogo</a>
  </div>

  <!-- CONTENIDO CARRITO -->
  <div id="carrito-contenido">
    <div class="row">
      <!-- ITEMS -->
      <div class="col-12 col-lg-8">
        <div id="tabla-carrito"></div>
      </div>

      <!-- RESUMEN -->
      <div class="col-12 col-lg-4 mt-4 mt-lg-0">
        <div class="form-card">
          <h5 style="font-family:'Bangers',cursive; letter-spacing:2px; color:var(--azul-oscuro);">Resumen del Pedido</h5>
          <hr/>
          <div id="resumen-items" class="mb-3"></div>
          <div class="d-flex justify-content-between mb-1">
            <span>Subtotal:</span>
            <span id="subtotal-val" class="fw-bold"></span>
          </div>
          <div class="d-flex justify-content-between mb-1 text-muted" style="font-size:0.85rem;">
            <span>Envío:</span>
            <span>Gratis 🎁</span>
          </div>
          <hr/>
          <div class="d-flex justify-content-between mb-3">
            <span class="fw-bold">Total:</span>
            <span id="total-val" style="font-family:'Bangers',cursive; font-size:1.5rem; color:var(--rojo-marvel);"></span>
          </div>

          <!-- DATOS ENVÍO -->
          <div class="mb-3">
            <label class="form-label">Dirección de envío *</label>
            <input type="text" class="form-control form-control-sm" id="dir-envio" placeholder="Calle, número, ciudad"/>
            <div class="form-text text-danger d-none" id="err-dir">Ingresa una dirección de envío.</div>
          </div>

          <div class="mb-4">
            <label class="form-label">Método de pago</label>
            <select class="form-select form-select-sm" id="metodo-pago">
              <option value="tarjeta">💳 Tarjeta de crédito/débito</option>
              <option value="transferencia">🏦 Transferencia bancaria</option>
              <option value="efectivo">💵 Efectivo en entrega</option>
            </select>
          </div>

          <button class="btn btn-marvel w-100" onclick="irAPago()">Proceder al Pago →</button>
          <a href="catalogo.html" class="btn btn-marvel-outline w-100 mt-2">← Seguir comprando</a>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="brand-footer">TIENDA MULTIVERSO</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script src="../js/navbar.js"></script>
<script>
  if (!requiereLogin()) {}
  renderNavbar('carrito');

  function renderCarrito() {
    const carrito = getCarrito();
    const productos = getProductos();
    const usuario = getUsuarioActual();

    // Prellenar dirección
    if (usuario && usuario.direccion) {
      document.getElementById('dir-envio').value = usuario.direccion;
    }

    if (carrito.length === 0) {
      document.getElementById('carrito-vacio').classList.remove('d-none');
      document.getElementById('carrito-contenido').classList.add('d-none');
      return;
    }

    let total = 0;
    let resumenHTML = '';

    const tablaHTML = carrito.map(item => {
      const p = productos.find(x => x.id === item.id);
      if (!p) return '';
      const subtotal = p.precio * item.cantidad;
      total += subtotal;
      resumenHTML += `<div class="d-flex justify-content-between mb-1" style="font-size:0.85rem;">
        <span>${p.nombre} ×${item.cantidad}</span>
        <span>${formatearPrecio(subtotal)}</span>
      </div>`;

      const imgPath = obtenerRuta(p.imagen);

      return `
      <div class="card mb-3" style="border-radius:10px; border:none; box-shadow:var(--sombra);">
        <div class="card-body">
          <div class="row align-items-center g-2">
            <div class="col-2 text-center">
              <img src="${imgPath}" alt="${p.nombre}" style="width: 60px; height: 60px; object-fit: contain; background: #f5f5f5; border-radius: 6px; padding: 4px;"/>
            </div>
            <div class="col-12 col-sm-5">
              <div class="fw-bold" style="font-size:0.9rem;">${p.nombre}</div>
              <div class="text-muted" style="font-size:0.8rem;">${p.serie}</div>
              <div style="color:var(--rojo-marvel); font-family:'Bangers',cursive;">${formatearPrecio(p.precio)}</div>
            </div>
            <div class="col-6 col-sm-3">
              <div class="d-flex align-items-center gap-2">
                <button class="btn btn-sm btn-outline-secondary" onclick="cambiarCantidad(${p.id}, -1)"
                  style="width:30px;height:30px;padding:0;border-radius:50%;">−</button>
                <span class="fw-bold" id="cant-${p.id}">${item.cantidad}</span>
                <button class="btn btn-sm btn-outline-secondary" onclick="cambiarCantidad(${p.id}, 1)"
                  style="width:30px;height:30px;padding:0;border-radius:50%;"
                  ${item.cantidad >= p.stock ? 'disabled' : ''}>+</button>
              </div>
            </div>
            <div class="col-6 col-sm-2 text-end">
              <div class="fw-bold" style="color:var(--rojo-marvel); font-family:'Bangers',cursive;">${formatearPrecio(subtotal)}</div>
              <button class="btn btn-sm text-danger p-0 mt-1" onclick="eliminarItem(${p.id})" title="Eliminar">🗑️</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('tabla-carrito').innerHTML = tablaHTML;
    document.getElementById('resumen-items').innerHTML = resumenHTML;
    document.getElementById('subtotal-val').textContent = formatearPrecio(total);
    document.getElementById('total-val').textContent = formatearPrecio(total);
  }

  function cambiarCantidad(id, delta) {
    const carrito = getCarrito();
    const productos = getProductos();
    const idx = carrito.findIndex(x => x.id === id);
    if (idx === -1) return;

    const p = productos.find(x => x.id === id);
    const nuevaCant = carrito[idx].cantidad + delta;

    if (nuevaCant <= 0) {
      carrito.splice(idx, 1);
    } else if (nuevaCant > p.stock) {
      mostrarToast('No hay más stock disponible', 'warning');
      return;
    } else {
      carrito[idx].cantidad = nuevaCant;
    }

    guardarCarrito(carrito);
    renderCarrito();
    actualizarBadgeCarrito();
  }

  function eliminarItem(id) {
    const carrito = getCarrito().filter(x => x.id !== id);
    guardarCarrito(carrito);
    renderCarrito();
    actualizarBadgeCarrito();
  }

  function irAPago() {
    const dir = document.getElementById('dir-envio').value.trim();
    const errDir = document.getElementById('err-dir');
    errDir.classList.add('d-none');

    if (!dir) {
      errDir.classList.remove('d-none');
      return;
    }

    const metodo = document.getElementById('metodo-pago').value;
    // Guardar datos de checkout en session
    sessionStorage.setItem('marvel_checkout', JSON.stringify({ dir, metodo }));
    window.location.href = 'pago.html';
  }

  renderCarrito();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Pedidos – TIENDA MULTIVERSO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="../css/styles.css" rel="stylesheet"/>
</head>
<body>
<div id="navbar-container"></div>

<div class="container mt-4 mb-5">
  <h2 style="font-family:'Bangers',cursive; font-size:2rem; letter-spacing:2px; color:var(--azul-oscuro);">
    📦 Mis Pedidos
  </h2>
  <hr/>

  <div id="sin-pedidos" class="text-center py-5 d-none">
    <div style="font-size:4rem;">📦</div>
    <h4 class="text-muted">Aún no tienes pedidos</h4>
    <p class="text-muted">Visita el catálogo y añade figuras a tu colección</p>
    <a href="catalogo.html" class="btn btn-marvel">Ver catálogo</a>
  </div>

  <div id="lista-pedidos"></div>
</div>

<footer>
  <div class="brand-footer">TIENDA MULTIVERSO</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script src="../js/navbar.js"></script>
<script>
  if (!requiereLogin()) {}
  renderNavbar('pedidos');

  const usuario = getUsuarioActual();
  const pedidos = getPedidos().filter(p => p.usuarioId === usuario.id);
  pedidos.reverse(); // más recientes primero

  if (pedidos.length === 0) {
    document.getElementById('sin-pedidos').classList.remove('d-none');
  } else {
    const html = pedidos.map(p => `
    <div class="card mb-3" style="border-radius:10px; border:none; box-shadow:var(--sombra);">
      <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2"
           style="background:var(--azul-oscuro); color:white; border-radius:10px 10px 0 0;">
        <div>
          <span style="font-family:'Bangers',cursive; letter-spacing:2px; font-size:1.1rem;">${p.id}</span>
          <span class="text-muted ms-2" style="font-size:0.85rem;">📅 ${p.fecha}</span>
        </div>
        <span class="badge bg-success">✅ ${p.estado}</span>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-12 col-md-8">
            <h6 class="fw-bold mb-2">Artículos:</h6>
            ${p.items.map(item =>
              `<div class="d-flex justify-content-between mb-1" style="font-size:0.88rem;">
                <span>🦸 ${item.nombre} × ${item.cantidad}</span>
                <span>${formatearPrecio(item.precio * item.cantidad)}</span>
              </div>`
            ).join('')}
          </div>
          <div class="col-12 col-md-4 mt-3 mt-md-0">
            <div class="text-md-end">
              <div class="text-muted" style="font-size:0.85rem;">📦 ${p.direccion}</div>
              <div class="text-muted mt-1" style="font-size:0.85rem;">💳 ${p.metodo}</div>
              <div class="mt-2" style="font-family:'Bangers',cursive; font-size:1.5rem; color:var(--rojo-marvel);">
                ${formatearPrecio(p.total)}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`).join('');

    document.getElementById('lista-pedidos').innerHTML = html;
  }
</script>
</body>
</html>
